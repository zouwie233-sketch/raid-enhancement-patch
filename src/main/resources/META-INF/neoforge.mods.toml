Independent NeoForge 1.21.1 patch mod for high-difficulty raid enhancement.
Stage 0.9.1.4 preserves the tested 0.9.1.3.1 BossBar audit throttle and all existing gameplay behavior. It introduces a diagnostic-only RaidCompletionResult projection at the existing victory settlement boundary so raidInstanceKey, villageKey, dimension, center, victory, eligible players, omen level, total waves, and completion time can be audited as one immutable snapshot. The projection is not an authoritative runtime source and does not change duplicate prevention, reward dispatch, VillageFavor writes, cleanup, settlement keys, RaidInstanceKey, VillageKey, key formats, raid wave counts, persistent data, VictoryBarAttachGuard behavior, or Mixin enablement.
'''

