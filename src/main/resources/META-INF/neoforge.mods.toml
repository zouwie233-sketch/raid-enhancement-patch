version="0.9.1.5-village-favor-gateway-audit-alpha"
displayName="Raid Enhancement Patch"
authors="Noah Black / ChatGPT"
description='''
Independent NeoForge 1.21.1 patch mod for high-difficulty raid enhancement.
Stage 0.9.1.5 preserves the tested 0.9.1.4 victory-settlement boundary and existing gameplay behavior. It introduces VillageFavorGateway as the settlement-facing read/write boundary: VictorySettlementController now calls the gateway, while the gateway delegates unchanged to VillageFavorSystem. A RaidCompletionResult overload is available for future migration but is not used by the runtime settlement consumer in this version. Favor values, growth rules, gifts, cooldowns, persistence, keys, BossBar behavior, rewards, raid waves and Mixin enablement are unchanged.
'''

