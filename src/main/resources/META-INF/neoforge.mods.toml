displayName="Raid Enhancement Patch"
authors="Noah Black / ChatGPT"
description='''
Independent NeoForge 1.21.1 patch mod for high-difficulty raid enhancement.
Stage 0.9.0.7 keeps the tested 0.9.0.3 RaidInstanceKey settlement fix and the 0.9.0.5 confirmed [REP] independent BossBar path. It applies a dimension-safe guard to completion cleanup so Nether/End ticks cannot mark an Overworld BossBar inactive. Cross-dimension cleanup attempts are logged as skipped-different-dimension instead of clearing the bar. This stage does not modify settlement keys, VillageFavor, rewards, villager gifts, raid wave counts, RaidWaveAuthority, RaidWaveExpansionController, the core progress algorithm, persistent data, or the wave-8 crash guard.
'''

